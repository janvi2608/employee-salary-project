<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);
background-size:400% 400%;
animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
padding:30px;
color:white;
}

.result-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
padding:40px;
color:white;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.result{
font-size:28px;
font-weight:600;
color:#00ffcc;
text-align:center;
animation: resultAnimation 1s ease;
}

@keyframes resultAnimation{
0%{
opacity:0;
transform:scale(0.6);
}
100%{
opacity:1;
transform:scale(1);
}
}

.btn-primary{
border-radius:10px;
font-weight:600;
transition:0.3s;
}

.btn-primary:hover{
transform:scale(1.05);
}

.loader{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="row g-4">

<!-- LEFT SIDE FORM -->

<div class="col-md-6">

<div class="card">

<h3 class="text-center mb-4">💰 Salary Prediction</h3>

<form action="/predict" method="post" onsubmit="showLoader()">

<div class="mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="mb-3">
<label>Gender</label>
<select name="gender" class="form-control">
<option value="0">Male</option>
<option value="1">Female</option>
</select>
</div>

<div class="mb-3">
<label>Job Role</label>
<input type="number" name="jobrole" class="form-control">
</div>

<div class="mb-3">
<label>Department</label>
<select name="department" class="form-control">
<option value="Engineering">Engineering</option>
<option value="Sales">Sales</option>
<option value="Finance">Finance</option>
<option value="HR">HR</option>
<option value="Marketing">Marketing</option>
<option value="Product">Product</option>
</select>
</div>

<div class="mb-3">
<label>Experience</label>
<input type="number" name="experience" class="form-control">
</div>

<div class="mb-3">
<label>Education</label>
<select name="education" class="form-control">
<option value="0">Bachelor</option>
<option value="1">Master</option>
<option value="2">PhD</option>
</select>
</div>

<div class="mb-3">
<label>Location</label>
<select name="location" class="form-control">
<option value="Austin">Austin</option>
<option value="Seattle">Seattle</option>
<option value="New York">New York</option>
<option value="San Francisco">San Francisco</option>
<option value="Chicago">Chicago</option>
</select>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">Predict Salary</button>
</div>

</form>

<div class="loader text-center" id="loader">
<div class="spinner-border text-light"></div>
<p>Predicting Salary...</p>
</div>

</div>
</div>

<!-- RIGHT SIDE RESULT -->

<div class="col-md-6">

<div class="result-box">

<h3 class="mb-4">📊 Prediction Result</h3>

{% if prediction_text %}
<div class="result">
✨ {{ prediction_text }}
</div>
{% else %}
<p>No prediction yet</p>
{% endif %}

</div>

</div>

</div>
</div>

<script>

function showLoader(){
document.getElementById("loader").style.display="block";
}

</script>

</body>
</html>
